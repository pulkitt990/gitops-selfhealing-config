apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: order-service-success-rate
  namespace: order-service
spec:
  args:
    - name: service-name

  metrics:
    # ── Metric 1: HTTP Error Rate ─────────────────────────────────────────────
    # FAILS if: error rate > 5% (more than 5% of requests are 5xx)
    # Uses failureCondition so failures are explicit — "no data" (0.0) = safe default
    - name: success-rate
      interval: 15s
      count: 8
      failureLimit: 2
      failureCondition: "result[0] > 0.05"
      provider:
        prometheus:
          address: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
          query: |
            (
              1 - (
                sum(rate(http_requests_total{status_code=~"2..",namespace="order-service"}[2m]))
                /
                sum(rate(http_requests_total{namespace="order-service"}[2m]))
              )
            ) or vector(0)

    # ── Metric 2: P99 Latency ────────────────────────────────────────────────
    # FAILS if: 99th percentile latency >= 2 seconds
    - name: p99-latency
      interval: 15s
      count: 8
      failureLimit: 2
      failureCondition: "result[0] >= 2.0"
      provider:
        prometheus:
          address: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
          query: |
            (
              histogram_quantile(
                0.99,
                sum(
                  rate(http_request_duration_seconds_bucket{namespace="order-service"}[2m])
                ) by (le)
              )
            ) or vector(0)
